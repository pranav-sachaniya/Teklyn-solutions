<!-- ===== CONSULTATION MODAL ===== -->
    <div class="modal-overlay" id="consultModal">
        <div class="modal-container">
            <button class="modal-close" id="closeConsultModal" aria-label="Close">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
            <h2 class="modal-title">Request a Consultation</h2>
            <p class="modal-desc">Tell us about your project and we'll get back to you shortly.</p>

            <form class="modal-form" id="consultForm" novalidate>
                <!-- Email -->
                <div class="form-group">
                    <label for="consultEmail">Email Address <span class="required">*</span></label>
                    <input type="email" id="consultEmail" name="email" placeholder="you@company.com" required
                        autocomplete="email">
                    <span class="form-error" id="emailError"></span>
                </div>

                <!-- Service Selection -->
                <div class="form-group">
                    <label>Services You're Interested In <span class="required">*</span></label>
                    <div class="checkbox-grid">
                        <label class="checkbox-label">
                            <input type="checkbox" name="services" value="Custom Software Development">
                            <span class="checkbox-custom"></span>
                            Custom Software Development
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="services" value="Web & Mobile App Development">
                            <span class="checkbox-custom"></span>
                            Web & Mobile App Development
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="services" value="Product Engineering & MVP">
                            <span class="checkbox-custom"></span>
                            Product Engineering & MVP
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="services" value="UI/UX Design & Prototyping">
                            <span class="checkbox-custom"></span>
                            UI/UX Design & Prototyping
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="services" value="AI Integration & Automation">
                            <span class="checkbox-custom"></span>
                            AI Integration & Automation
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="services" value="Digital Marketing & SEO">
                            <span class="checkbox-custom"></span>
                            Digital Marketing & SEO
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="services" value="Technology Consulting & Modernization">
                            <span class="checkbox-custom"></span>
                            Technology Consulting & Modernization
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="services" value="Software Maintenance & Support">
                            <span class="checkbox-custom"></span>
                            Software Maintenance & Support
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="services" value="Quality Assurance & Testing">
                            <span class="checkbox-custom"></span>
                            Quality Assurance & Testing
                        </label>
                    </div>
                    <span class="form-error" id="servicesError"></span>
                </div>

                <!-- Description -->
                <div class="form-group">
                    <label for="consultDesc">Tell Us About Your Requirements <span class="required">*</span></label>
                    <textarea id="consultDesc" name="description" rows="4"
                        placeholder="Describe your project, timeline, budget range, or any specific requirements..."
                        required></textarea>
                    <span class="form-error" id="descError"></span>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn-demo btn-submit" id="submitConsult">
                    <span class="btn-submit-text">Submit Request</span>
                    <span class="btn-submit-loader" style="display:none;">
                        <svg class="spinner" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5">
                            <circle cx="12" cy="12" r="10" stroke-dasharray="31.4" stroke-dashoffset="10"
                                stroke-linecap="round" />
                        </svg>
                        Submitting...
                    </span>
                </button>
            </form>

            <!-- Success Message -->
            <div class="modal-success" id="consultSuccess" style="display:none;">
                <div class="success-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#0D3D3D" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M8 12l2.5 2.5L16 9" />
                    </svg>
                </div>
                <h3>Request Submitted!</h3>
                <p>Your request has been submitted successfully. Our team will contact you shortly.</p>
                <button class="btn-demo" id="closeSuccessModal" style="margin-top:20px;"><span class="dot"></span>
                    Close</button>
            </div>

            <!-- Error Message -->
            <div class="modal-error" id="consultError" style="display:none;">
                <div class="error-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="12" />
                        <line x1="12" y1="16" x2="12.01" y2="16" />
                    </svg>
                </div>
                <h3>Submission Failed</h3>
                <p>Something went wrong. Please try again or email us directly at <a
                        href="mailto:teklynllp@gmail.com">teklynllp@gmail.com</a>.</p>
                <button class="btn-demo" id="retryConsult" style="margin-top:20px;"><span class="dot"></span> Try
                    Again</button>
            </div>
        </div>
    </div>
